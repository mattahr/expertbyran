services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - expertbyran-data:/app/data
    environment:
      - API_TOKEN=${API_TOKEN:-secret-token-change-me}
      - DATA_DIR=/app/data
      - SITE_DATA_URL=api
      - SITE_DATA_REVALIDATE_SECONDS=300
      - NODE_ENV=production
    restart: unless-stopped

volumes:
  expertbyran-data:
    driver: local
