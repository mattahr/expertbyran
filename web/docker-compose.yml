services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - expertbyran-data:/app/data
    environment:
      - API_TOKEN=${API_TOKEN:-secret-token-change-me}
      # Admin (/admin) + besöksstatistik
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-change-me}
      # - ADMIN_SESSION_SECRET=
      # - SESSION_TTL_DAYS=7
      - DATA_DIR=/app/data
      - SITE_DATA_URL=api
      - SITE_DATA_REVALIDATE_SECONDS=300
      - NODE_ENV=production
    restart: unless-stopped

volumes:
  expertbyran-data:
    driver: local
