name: Refresh Web Cache

# Manuell nödventil: invaliderar webbappens datacache via GET /refresh.
# Endpointen kräver bearer-token (samma API_TOKEN som webbappens skrivväg) —
# konfigurera repo-secreten WEB_API_TOKEN. Den tidigare triggern på
# web/site-data.json är borttagen: webben läser inte längre den filen
# (innehållet bor i SQLite på volymen och muteras via API:t).

on:
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Refresh expertbyran.ahrens.nu
        shell: bash
        run: |
          response="$(
            curl \
              --fail \
              --show-error \
              --silent \
              --location \
              --retry 5 \
              --retry-delay 5 \
              --retry-all-errors \
              --max-time 30 \
              --header "Authorization: Bearer ${{ secrets.WEB_API_TOKEN }}" \
              https://expertbyran.ahrens.nu/refresh
          )"

          echo "$response"
