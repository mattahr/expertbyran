name: Publish Web Container Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional extra tag to publish, for example v1.0.0
        required: false
        type: string
      push_latest:
        description: Also publish the latest tag
        required: false
        default: true
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Normalize image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=${{ inputs.image_tag }},enable=${{ inputs.image_tag != '' }}
            type=raw,value=latest,enable=${{ inputs.push_latest }}
          labels: |
            org.opencontainers.image.title=Expertbyrån
            org.opencontainers.image.description=Expertbyrån website container image
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Write workflow summary
        shell: bash
        run: |
          {
            echo "## Published image"
            echo
            echo "- Image: \`${{ steps.image.outputs.name }}\`"
            echo "- Tags:"
            while IFS= read -r tag; do
              [ -n "$tag" ] && echo "  - \`$tag\`"
            done <<< "${{ steps.meta.outputs.tags }}"
            echo "- Digest: \`${{ steps.push.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
